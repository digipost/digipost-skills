<svg xmlns="http://www.w3.org/2000/svg" width="980" height="740" viewBox="0 0 980 740" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B6B7B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="740" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="34" font-size="19" font-weight="700" fill="#1B2733">Digipost skills — decision-point model</text>
  <text x="40" y="56" font-size="13" fill="#5B6B7B">Ask only when a decision is both <tspan font-weight="700" fill="#1B2733">material</tspan> and <tspan font-weight="700" fill="#1B2733">unresolved</tspan>.</text>

  <!-- Start -->
  <rect x="370" y="80" width="240" height="44" rx="22" fill="#E8EDF2" stroke="#33475B" stroke-width="1.5"/>
  <text x="490" y="107" font-size="13" font-weight="600" fill="#1B2733" text-anchor="middle">A decision point is reached</text>
  <line x1="490" y1="124" x2="490" y2="150" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Material? diamond -->
  <polygon points="490,152 592,196 490,240 388,196" fill="#EAF1F8" stroke="#2F6FAD" stroke-width="1.5"/>
  <text x="490" y="200" font-size="13" font-weight="600" fill="#1B2733" text-anchor="middle">Material?</text>
  <text x="612" y="185" font-size="10.5" fill="#5B6B7B">cost · compliance · irreversible</text>
  <text x="612" y="200" font-size="10.5" fill="#5B6B7B">real-world effect · forgone value</text>

  <!-- No -> silent default -->
  <line x1="388" y1="196" x2="300" y2="196" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="344" y="188" font-size="11" font-weight="600" fill="#2E7D50" text-anchor="middle">No</text>
  <rect x="40" y="173" width="250" height="46" rx="10" fill="#DCF3E4" stroke="#2E7D50" stroke-width="1.5"/>
  <text x="165" y="202" font-size="12.5" font-weight="600" fill="#184D33" text-anchor="middle">Silent default · just proceed</text>

  <!-- Yes down -->
  <line x1="490" y1="240" x2="490" y2="266" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="503" y="258" font-size="11" font-weight="600" fill="#C0392B">Yes</text>

  <!-- Already resolved? diamond -->
  <polygon points="490,268 600,314 490,360 380,314" fill="#EAF1F8" stroke="#2F6FAD" stroke-width="1.5"/>
  <text x="490" y="318" font-size="12.5" font-weight="600" fill="#1B2733" text-anchor="middle">Already resolved?</text>

  <!-- Yes -> proceed with answer -->
  <line x1="600" y1="314" x2="688" y2="314" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="644" y="306" font-size="11" font-weight="600" fill="#2E7D50" text-anchor="middle">Yes</text>
  <rect x="690" y="288" width="252" height="52" rx="10" fill="#DCF3E4" stroke="#2E7D50" stroke-width="1.5"/>
  <text x="816" y="309" font-size="12.5" font-weight="600" fill="#184D33" text-anchor="middle">Proceed with their answer</text>
  <text x="816" y="326" font-size="11" fill="#2E7D50" text-anchor="middle">stated or safely inferable — no question</text>

  <!-- No down to classifier -->
  <line x1="490" y1="360" x2="490" y2="388" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="503" y="380" font-size="11" font-weight="600" fill="#C0392B">No</text>

  <!-- Classifier -->
  <rect x="388" y="388" width="204" height="42" rx="10" fill="#E8EDF2" stroke="#33475B" stroke-width="1.5"/>
  <text x="490" y="414" font-size="12.5" font-weight="600" fill="#1B2733" text-anchor="middle">Choose response mode</text>

  <!-- Bus -->
  <line x1="490" y1="430" x2="490" y2="470" stroke="#5B6B7B" stroke-width="1.5"/>
  <line x1="175" y1="470" x2="805" y2="470" stroke="#5B6B7B" stroke-width="1.5"/>
  <line x1="175" y1="470" x2="175" y2="512" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="470" x2="490" y2="512" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="805" y1="470" x2="805" y2="512" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Outcome: assume & announce -->
  <rect x="30" y="514" width="290" height="104" rx="10" fill="#FDEFD4" stroke="#B7791F" stroke-width="1.5"/>
  <text x="175" y="537" font-size="14" font-weight="700" fill="#7A4F0A" text-anchor="middle">Assume &amp; announce</text>
  <text x="175" y="556" font-size="11" font-style="italic" fill="#8A6014" text-anchor="middle">"I'll use X — tell me if not"</text>
  <text x="175" y="578" font-size="10.5" fill="#5B4A28" text-anchor="middle">reversible · safe default exists</text>
  <text x="175" y="595" font-size="10.5" fill="#5B4A28" text-anchor="middle">recipient addressing · client library</text>
  <text x="175" y="610" font-size="10.5" fill="#5B4A28" text-anchor="middle">polling cadence · encoding</text>

  <!-- Outcome: ask before proceeding -->
  <rect x="345" y="514" width="290" height="104" rx="10" fill="#FBE0DE" stroke="#C0392B" stroke-width="1.5"/>
  <text x="490" y="537" font-size="14" font-weight="700" fill="#8E241B" text-anchor="middle">Ask before proceeding</text>
  <text x="490" y="556" font-size="11" font-style="italic" fill="#A32C22" text-anchor="middle">blocking gate — no safe default</text>
  <text x="490" y="578" font-size="10.5" fill="#6B2A23" text-anchor="middle">auth &amp; sensitivity level · test → prod</text>
  <text x="490" y="595" font-size="10.5" fill="#6B2A23" text-anchor="middle">physical fallback · delete</text>
  <text x="490" y="610" font-size="10.5" fill="#6B2A23" text-anchor="middle">share duration &amp; purpose</text>

  <!-- Outcome: offer once -->
  <rect x="660" y="514" width="290" height="104" rx="10" fill="#DEEAFB" stroke="#2F6FAD" stroke-width="1.5"/>
  <text x="805" y="537" font-size="14" font-weight="700" fill="#1E4F80" text-anchor="middle">Offer once</text>
  <text x="805" y="556" font-size="11" font-style="italic" fill="#2560A0" text-anchor="middle">one menu line, no nag</text>
  <text x="805" y="578" font-size="10.5" fill="#284B6E" text-anchor="middle">SMS reminder · extra attachments</text>
  <text x="805" y="595" font-size="10.5" fill="#284B6E" text-anchor="middle">invoice · identify-first · Control</text>
  <text x="805" y="610" font-size="10.5" fill="#284B6E" text-anchor="middle">value-add the user may not know</text>

  <!-- Balance levers footer -->
  <line x1="40" y1="656" x2="940" y2="656" stroke="#D5DCE3" stroke-width="1"/>
  <text x="40" y="682" font-size="12" font-weight="700" fill="#1B2733">Balance levers</text>
  <text x="40" y="703" font-size="11.5" fill="#5B6B7B">front-load one scoping batch at the entry skill · "if unspecified" on every gate · decisions are sticky (never re-ask) · inform ≠ ask</text>
  <text x="40" y="723" font-size="11" fill="#8493A1">Lightweight default: only the red gates stop the agent; everything else announces or offers and keeps moving.</text>
</svg>
